<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bond Valuation Formula | CFA Institute</title>

  <link rel="stylesheet" href="cfa-base.css" />
  <link rel="stylesheet" href="bond-ytm-specific.css" />

  <script type="text/x-mathjax-config">
    MathJax.Hub.Config({
      MathML: {
        extensions: ["content-mathml.js"]
      },
      showProcessingMessages: false,
      messageStyle: "none",
      showMathMenu: false,
      menuSettings: { zoom: "None" },
      "HTML-CSS": {
        scale: 100,
        minScaleAdjust: 50
      }
    });

    function removeMathJaxTabindex() {
      document.querySelectorAll(".MathJax, .MathJax_Display, [id^='MathJax-']").forEach(function (el) {
        el.removeAttribute("tabindex");
      });
    }

    MathJax.Hub.Register.StartupHook("End", function () {
      MathJax.Hub.Queue(function () {
        document.querySelectorAll(".equation-container math").forEach(function (math) {
          math.style.visibility = "visible";
        });

        removeMathJaxTabindex();
        setTimeout(removeMathJaxTabindex, 100);
        setTimeout(removeMathJaxTabindex, 500);
      });
    });
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=MML_HTMLorMML"></script>
</head>
<body>
  <div class="container">
    <main>
      <section id="static-equation-card" class="card">

        <div class="equation-container">
          <math xmlns="http://www.w3.org/1998/Math/MathML" display="block">
            <mrow>
              <msub>
                <mi mathcolor="#b95b1d">PV</mi>
                <mtext mathcolor="#b95b1d" mathvariant="italic">Coupon bond</mtext>
              </msub>
              <mo>=</mo>
              <mfrac linethickness="1.2px">
                <mi mathcolor="#3c6ae5">PMT</mi>
                <mi mathcolor="#7a46ff">r</mi>
              </mfrac>
              <mo>×</mo>
              <mrow>
                <mo>[</mo>
                <mn>1</mn>
                <mo>−</mo>
                <mfrac linethickness="1.2px">
                  <mn>1</mn>
                  <msup>
                    <mrow>
                      <mo>(</mo>
                      <mn>1</mn>
                      <mo>+</mo>
                      <mi mathcolor="#7a46ff">r</mi>
                      <mo>)</mo>
                    </mrow>
                    <mi mathcolor="#15803d">T</mi>
                  </msup>
                </mfrac>
                <mo>]</mo>
              </mrow>
              <mo>+</mo>
              <mfrac linethickness="1.2px">
                <mi mathcolor="#0079a6">FV</mi>
                <msup>
                  <mrow>
                    <mo>(</mo>
                    <mn>1</mn>
                    <mo>+</mo>
                    <mi mathcolor="#7a46ff">r</mi>
                    <mo>)</mo>
                  </mrow>
                  <mi mathcolor="#15803d">T</mi>
                </msup>
              </mfrac>
            </mrow>
          </math>
        </div>

        <p class="equation-intro" style="margin-top: 1rem;">
          Assuming that
          <math xmlns="http://www.w3.org/1998/Math/MathML">
            <mstyle mathcolor="#3c6ae5"><mi>PMT</mi></mstyle>
          </math>
          and
          <math xmlns="http://www.w3.org/1998/Math/MathML">
            <mstyle mathcolor="#7a46ff"><mi>r</mi></mstyle>
          </math>
          are annual values and that a bond pays coupons semiannually, we can modify this expression as follows:
        </p>

        <div class="equation-container">
          <math xmlns="http://www.w3.org/1998/Math/MathML" display="block">
            <mrow>
              <msub>
                <mi mathcolor="#b95b1d">PV</mi>
                <mtext mathcolor="#b95b1d" mathvariant="italic">Coupon bond</mtext>
              </msub>
              <mo>=</mo>
              <mfrac linethickness="1.2px">
                <mi mathcolor="#3c6ae5">PMT</mi>
                <mi mathcolor="#7a46ff">r</mi>
              </mfrac>
              <mo>×</mo>
              <mrow>
                <mo>[</mo>
                <mn>1</mn>
                <mo>−</mo>
                <mfrac linethickness="1.2px">
                  <mn>1</mn>
                  <msup>
                    <mrow>
                      <mo>(</mo>
                      <mn>1</mn>
                      <mo>+</mo>
                      <mfrac linethickness="1.2px">
                        <mi mathcolor="#7a46ff">r</mi>
                        <mn>2</mn>
                      </mfrac>
                      <mo>)</mo>
                    </mrow>
                    <mrow>
                      <mn>2</mn>
                      <mi mathcolor="#15803d">T</mi>
                    </mrow>
                  </msup>
                </mfrac>
                <mo>]</mo>
              </mrow>
              <mo>+</mo>
              <mfrac linethickness="1.2px">
                <mi mathcolor="#0079a6">FV</mi>
                <msup>
                  <mrow>
                    <mo>(</mo>
                    <mn>1</mn>
                    <mo>+</mo>
                    <mfrac linethickness="1.2px">
                      <mi mathcolor="#7a46ff">r</mi>
                      <mn>2</mn>
                    </mfrac>
                    <mo>)</mo>
                  </mrow>
                  <mrow>
                    <mn>2</mn>
                    <mi mathcolor="#15803d">T</mi>
                  </mrow>
                </msup>
              </mfrac>
            </mrow>
          </math>
        </div>

      </section>
    </main>
  </div>
</body>
</html>
